services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      
  llm-interface:
    build:
      context: ./src/services/llm_interface
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./configs:/app/configs:ro
      - ./configs/apis.key:/app/apis.key:ro
      - llm_interface_code:/app/src
    environment:
      - PYTHONPATH=/app
      - AGENT_CONFIGS_FILE=/app/configs/agents.yml
      - REDIS_URL=redis://redis:6379
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy

  node-env:
    build:
      context: ./src/services/environment
      dockerfile: Dockerfile
    ports:
      - "8001:8000"
    volumes:
      - ./configs:/app/configs:ro
      - environment_code:/app/src
    environment:
      - PYTHONPATH=/app
      - LLM_SERVICE_URL=http://llm-interface:8000
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - llm-interface

  search:
    build:
      context: ./src/services/search
      dockerfile: Dockerfile
    ports:
      - "8002:8000"
    volumes:
      - ./configs:/app/configs:ro
      - search_code:/app/src
    environment:
      - PYTHONPATH=/app
      - LLM_SERVICE_URL=http://llm-interface:8000
      - ENV_SERVICE_URL=http://node-env:8000
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8002/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - llm-interface
      - node-env

  gui:
    build:
      context: ./src/services/gui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: "http://localhost:8002/"
        NEXT_PUBLIC_LLM_INTERFACE_URL: "http://localhost:8000/"
        NEXT_PUBLIC_NODE_ENV_URL: "http://localhost:8001/"
        NEXT_PUBLIC_SEARCH_URL: "http://localhost:8002/"
    ports:
      - "3000:3000"
    volumes:
      - gui_code:/app
      - gui_node_modules:/app/node_modules
      - gui_next:/app/.next
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8002/
      - NEXT_PUBLIC_LLM_INTERFACE_URL=http://localhost:8000/
      - NEXT_PUBLIC_NODE_ENV_URL=http://localhost:8001/
      - NEXT_PUBLIC_SEARCH_URL=http://localhost:8002/
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - search

volumes:
  llm_interface_code:
  environment_code:
  search_code:
  gui_code:
  gui_node_modules:
  gui_next:

